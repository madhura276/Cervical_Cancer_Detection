<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #fff;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #6d28d9;
            margin-bottom: 1rem;
        }

        form input {
            width: 100%;
            padding: 0.7rem;
            margin: 0.5rem 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            background-color: #6d28d9;
            color: white;
            padding: 0.7rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background-color: #4c1d95;
        }

        p {
            margin-top: 1rem;
        }

        a {
            color: #6d28d9;
            text-decoration: none;
        }

        input, select, button {
            width: 100%;
            margin-bottom: 15px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            background-color: #6c63ff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #554dcc;
        }

        .message {
            font-size: 0.85rem;
            color: red;
            margin-top: -10px;
        }

        .message.success {
            color: green;
        }

        body {
            font-family: Arial, sans-serif;
            background: url('/static/imgs/bg.jpg') no-repeat center center/cover;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            animation: backgroundMove 15s infinite alternate ease-in-out;
        }

        /* Make the dropdown scrollable */
        select {
            height: auto;
            max-height: 150px; /* Limit height of dropdown */
            overflow-y: scroll; /* Enable vertical scrolling */
        }

        @keyframes backgroundMove {
            0% {
                background-position: center top;
            }
            100% {
                background-position: center bottom;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sign Up</h1>
        
        {% if messages %}
            <ul>
                {% for category, message in messages %}
                    <li style="color: {% if category == 'error' %}red{% else %}green{% endif %};">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        
        <form method="post">
            <input type="text" name="name" placeholder="Name" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" id="password" name="password" placeholder="Password" required>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required>
            <select name="country" id="country" required>
                <option value="">Select Country</option>
            </select>
            <div id="message" class="message"></div>
            <button id="signupBtn" type="submit" disabled>Sign Up</button>
        </form>
        
        <script>
            // Fetch country data and populate select dropdown
            document.addEventListener('DOMContentLoaded', function () {
                const countries = [
                    "India", "USA", "UK", "Canada", "Australia",
                    "Germany", "France", "Japan", "China", "Brazil"
                ];

                const countrySelect = document.getElementById('country');

                countries.forEach(country => {
                    const option = document.createElement('option');
                    option.value = country;
                    option.textContent = country;
                    countrySelect.appendChild(option);
                });
            });

            // Password match validation
            const passwordInput = document.getElementById('password');
            const confirmPasswordInput = document.getElementById('confirm_password');
            const messageDiv = document.getElementById('message');
            const signupButton = document.getElementById('signupBtn');

            function validatePasswords() {
                const password = passwordInput.value;
                const confirmPassword = confirmPasswordInput.value;

                if (confirmPassword === '') {
                    messageDiv.textContent = '';
                    signupButton.disabled = true;
                    return;
                }

                if (password === confirmPassword) {
                    messageDiv.textContent = 'Passwords match!';
                    messageDiv.classList.add('success');
                    messageDiv.classList.remove('error');
                    signupButton.disabled = false;
                } else {
                    messageDiv.textContent = 'Passwords do not match!';
                    messageDiv.classList.add('error');
                    messageDiv.classList.remove('success');
                    signupButton.disabled = true;
                }
            }

            passwordInput.addEventListener('input', validatePasswords);
            confirmPasswordInput.addEventListener('input', validatePasswords);
        </script>
    
        <p>Already have an account? <a href="/">Log In</a></p>
    </div>
</body>
</html>
